<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외선물 자동매매 실황 · 실전 & 모의 · Pro-man</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E14; --ink2:#0E131C; --panel:#141A24;
    --hair:rgba(255,255,255,.08); --hair2:rgba(255,255,255,.14);
    --hi:#EAF0FA; --mu:#AAB6C6; --mu2:#7C8A9C;
    --up:#2BD98E; --down:#FF5C6C; --gold:#E8B65A; --gold2:#C8923A;
    --real:#FFC24B; --real2:#D9942E;
    --demo:#5B7287; --demo2:#3C4C5C;
    --shadow:0 18px 50px rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#05070B;overflow:hidden;font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  #fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #stage{width:1920px;height:1080px;flex:none;transform-origin:center center;
    background:linear-gradient(180deg,#0B0E14,#080B11 60%,#06080D);
    position:relative;overflow:hidden;color:var(--hi);padding:28px 46px 16px;display:flex;flex-direction:column;gap:14px}

  .hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;position:relative;z-index:2}
  .hdr .left{display:flex;flex-direction:column;gap:8px}
  .eyebrow{display:flex;align-items:center;gap:14px;color:var(--gold);font-size:22px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
  .eyebrow .bar{width:42px;height:3px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px}
  .title{font-size:46px;font-weight:900;line-height:1.02;letter-spacing:-.01em;color:#fff;text-shadow:0 2px 30px rgba(232,182,90,.18)}
  .title .by{color:var(--gold);font-weight:900}
  .u{display:block;height:5px;width:100%;margin-top:10px;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2) 22%,transparent 60%)}
  .hdr .right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none}
  .live{display:flex;align-items:center;gap:11px;background:rgba(255,92,108,.10);border:1px solid rgba(255,92,108,.35);padding:8px 16px;border-radius:999px}
  .live .dot{width:12px;height:12px;border-radius:50%;background:var(--down);animation:pulse 1.6s infinite}
  .live .txt{font-weight:800;letter-spacing:.12em;font-size:21px;color:#fff}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,92,108,.55)}70%{box-shadow:0 0 0 14px rgba(255,92,108,0)}100%{box-shadow:0 0 0 0 rgba(255,92,108,0)}}
  .datebox{font-size:34px;font-weight:900;color:var(--gold)}
  .clock{font-size:48px;font-weight:800;line-height:1}
  .clock .z{color:var(--mu);font-size:20px;font-weight:800;margin-left:10px;letter-spacing:.08em}
  .byline{font-size:22px;color:var(--mu);font-weight:800;margin-top:4px}
  .byline b{color:var(--gold);font-weight:900;font-size:26px}

  .body{display:grid;grid-template-columns:1fr 410px;gap:16px;flex:1;min-height:0;position:relative;z-index:2}
  .board{display:grid;grid-template-columns:1fr 1fr;gap:18px;min-height:0}

  .zone{position:relative;border-radius:22px;padding:14px 14px 16px;display:flex;flex-direction:column;gap:12px;min-height:0;overflow:hidden}
  .zone.real{background:radial-gradient(120% 80% at 50% -10%,rgba(255,194,75,.16),transparent 60%),linear-gradient(165deg,#33260C,#1B1206 72%);
    border:3px solid var(--real);box-shadow:0 0 60px rgba(255,194,75,.22),inset 0 0 70px rgba(255,194,75,.05)}
  .zone.demo{background:linear-gradient(165deg,#141C26,#0B121A 72%);
    border:3px solid rgba(91,114,135,.45);box-shadow:inset 0 0 70px rgba(0,0,0,.5);filter:saturate(.92)}
  .zone .wm{position:absolute;font-weight:900;pointer-events:none;z-index:0;white-space:nowrap;letter-spacing:.04em}
  .zone.real .wm{font-size:230px;color:rgba(255,194,75,.07);transform:rotate(-16deg);top:34%;left:-4%}
  .zone.demo .wm{font-size:200px;color:rgba(140,170,200,.085);transform:rotate(-16deg);top:30%;left:-6%}
  .zone>*{position:relative;z-index:1}

  .zhead{display:flex;align-items:center;gap:14px;padding:12px 22px;border-radius:15px;font-weight:900}
  .zhead .zic{font-size:32px;line-height:1}
  .zhead .zt{display:flex;flex-direction:column;gap:1px}
  .zhead .zk{font-size:30px;letter-spacing:.01em;line-height:1}
  .zhead .ze{font-size:15px;font-weight:800;letter-spacing:.18em}
  .zhead .zwarn{margin-left:auto;font-size:17px;font-weight:900;padding:6px 15px;border-radius:999px}
  .zone.real .zhead{background:linear-gradient(90deg,var(--real),var(--real2));color:#1B1206;box-shadow:0 6px 24px rgba(255,194,75,.4)}
  .zone.real .zhead .ze{color:#4A340F}
  .zone.real .zhead .zwarn{background:rgba(27,18,6,.28);color:#1B1206;border:1px solid rgba(27,18,6,.35)}
  .zone.demo .zhead{background:linear-gradient(90deg,#2A3848,#1A2532);color:#AFC2D6;border:1px solid rgba(120,145,170,.3)}
  .zone.demo .zhead .ze{color:#7C90A6}
  .zone.demo .zhead .zwarn{background:rgba(120,145,170,.14);color:#AFC2D6;border:1px solid rgba(120,145,170,.32)}

  .zcards{flex:1;display:flex;flex-direction:column;gap:12px;min-height:0}

  /* ── 카드: 이름+태그+시드 헤더 / 2×2 지표 (압축, 안 잘리게) ── */
  .acard{flex:1;border-radius:16px;padding:15px 24px;display:flex;flex-direction:column;justify-content:center;gap:12px;
    position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)}
  .acard .accent{position:absolute;left:0;top:0;bottom:0;width:6px}
  .zone.real .acard{background:linear-gradient(180deg,rgba(255,210,120,.10),rgba(0,0,0,.32));border:2px solid rgba(255,194,75,.5)}
  .zone.real .acard .accent{background:linear-gradient(180deg,var(--real),var(--real2))}
  .zone.demo .acard{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.28));border:2px solid rgba(91,114,135,.32)}
  .zone.demo .acard .accent{background:linear-gradient(180deg,var(--demo),var(--demo2))}

  .acard .chead{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .acard .nm{display:flex;align-items:center;gap:13px;min-width:0}
  .acard .name{font-size:34px;font-weight:900;white-space:nowrap;line-height:1}
  .zone.real .name{color:#fff;text-shadow:0 0 18px rgba(255,194,75,.4)}
  .zone.demo .name{color:#DCE7F2}
  .acard .tag{font-size:15px;font-weight:900;letter-spacing:.08em;padding:5px 13px;border-radius:999px;white-space:nowrap}
  .zone.real .tag{color:#1B1206;background:var(--real);box-shadow:0 0 16px rgba(255,194,75,.45)}
  .zone.demo .tag{color:#9FB3C8;background:rgba(120,145,170,.16);border:1px solid rgba(120,145,170,.4)}
  .acard .seedpill{font-size:20px;font-weight:900;color:var(--mu);background:rgba(255,255,255,.05);border:1px solid var(--hair);border-radius:999px;padding:4px 15px;white-space:nowrap}
  .acard .seedpill b{color:#fff}

  .acard .grid4{display:grid;grid-template-columns:1fr 1fr;gap:9px 20px}
  .acard .cell{display:flex;flex-direction:column;gap:2px;min-width:0}
  .acard .cell .ck{font-size:18px;color:var(--mu);font-weight:800;white-space:nowrap}
  .acard .cell .cv{font-size:33px;font-weight:900;letter-spacing:-.01em;line-height:1.04;white-space:nowrap}
  .zone.real .cell .cv{color:#fff} .zone.demo .cell .cv{color:#C8D6E4}
  .acard .cell .cv.pos{color:var(--up)!important} .acard .cell .cv.neg{color:var(--down)!important} .acard .cell .cv.flat{color:var(--mu)!important}

  .empty{flex:1;border:2.5px dashed rgba(255,194,75,.4);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    background:repeating-linear-gradient(45deg,rgba(255,194,75,.04),rgba(255,194,75,.04) 16px,transparent 16px,transparent 32px)}
  .empty .e1{font-size:34px;font-weight:900;color:var(--real);opacity:.9}
  .empty .e2{font-size:18px;font-weight:800;color:var(--mu)}

  .market{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--hair);border-radius:16px;padding:20px 30px;display:flex;flex-direction:column;box-shadow:var(--shadow);min-height:0}
  .market .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .market .mh .t{font-size:28px;font-weight:900}
  .market .mh .tf{font-size:18px;color:var(--gold);font-weight:800;border:1px solid rgba(232,182,90,.3);border-radius:8px;padding:4px 11px}
  #mrows{flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:9px;margin-top:4px}
  .mrow{display:flex;flex-direction:column;gap:3px;padding:10px 15px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));
    border:1px solid var(--hair);border-left:4px solid var(--mu2);border-radius:12px}
  .mrow.up{border-left-color:var(--up)} .mrow.down{border-left-color:var(--down)} .mrow.flat{border-left-color:var(--mu2)}
  .mrow .sym{font-size:27px;font-weight:900}
  .mrow .rt{display:flex;align-items:baseline;gap:14px}
  .mrow .px{font-size:27px;font-weight:800} .mrow .ch{font-size:23px;font-weight:900}
  .mrow.up .ch{color:var(--up)} .mrow.down .ch{color:var(--down)} .mrow.flat .ch{color:var(--mu)}
  @media (prefers-reduced-motion:reduce){.live .dot{animation:none}}
</style>
</head>
<body>
<div id="fit"><div id="stage">

  <header class="hdr">
    <div class="left">
      <div class="eyebrow"><span class="bar"></span>AUTOMATED OVERSEAS FUTURES · 24/7 LIVE</div>
      <div class="title">해외선물 자동매매 실황 · 실전 &amp; 모의 <span class="by">by Pro-man</span></div>
      <span class="u"></span>
    </div>
    <div class="right">
      <div class="live"><span class="dot"></span><span class="txt">LIVE · 24/7</span></div>
      <div class="datebox" id="date">------ (-)</div>
      <div class="clock mono"><span id="clock">00:00:00</span><span class="z">KST</span></div>
      <div class="byline">개발자 <b>박상규</b></div>
    </div>
  </header>

  <section class="body">
    <div class="board">
      <div class="zone real">
        <div class="wm">REAL ₩</div>
        <div class="zhead"><span class="zic">⚡</span><div class="zt"><div class="zk">실전계좌</div><div class="ze">REAL · LIVE MONEY</div></div><span class="zwarn">실제 자금</span></div>
        <div class="zcards" id="realCards"></div>
      </div>
      <div class="zone demo">
        <div class="wm">DEMO</div>
        <div class="zhead"><span class="zic">🧪</span><div class="zt"><div class="zk">데모(모의)계좌</div><div class="ze">DEMO · PRACTICE</div></div><span class="zwarn">연습 · 가상자금</span></div>
        <div class="zcards" id="demoCards"></div>
      </div>
    </div>
    <aside class="market">
      <div class="mh"><div class="t">시세 · 방향</div><div class="tf">일봉 · D1</div></div>
      <div id="mrows"></div>
    </aside>
  </section>

</div></div>

<script>
// 계좌 배치/이름을 HTML이 자체 결정. 서버(/api/state)는 acc id 로만 매칭.
const MAP = {
  acc06: {kind:"demo", row:1, label:"전략1호"},
  acc05: {kind:"demo", row:2, label:"전략2호"},
  acc07: {kind:"demo", row:3, label:"전략3호"},
  acc02: {kind:"real", row:3, label:"포세이돈"},
};
const PEND = {
  "real-1": {kind:"real", status:"pending", label:"제우스", sub:"IC Markets 실전 · 입금대기"},
  "real-2": {kind:"real", status:"pending", label:"하데스", sub:"(곧 공개)"},
  "real-3": {kind:"real", status:"pending", label:"포세이돈", sub:"acc02 실전 · 연결대기"},
};

const DEMO={ts:Date.now(),accounts:[
  {acc:"acc06",seed:10000,equity:19737.35,balance:18689.15,positions:8,updated:"--:--:--"},
  {acc:"acc05",seed:3000, equity:11543.65,balance:11506.66,positions:5,updated:"--:--:--"},
  {acc:"acc07",seed:10000,equity:11987.37,balance:12013.52,positions:4,updated:"--:--:--"},
  {acc:"acc02",seed:58,   equity:57.28,   balance:60.73,   positions:2,updated:"--:--:--"},
],brief:[
  {name:"BITCOIN",price:62971.65,pct:-2.22,digits:2},{name:"GOLD",price:4310.40,pct:-0.15,digits:2},
  {name:"WTI",price:90.893,pct:2.68,digits:3},{name:"NASDAQ",price:28969.45,pct:-2.51,digits:2},
  {name:"HANGSENG",price:24608.00,pct:-2.40,digits:2},
]};

const $=s=>document.querySelector(s);
const fmt=(n,d=2)=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const sgn=n=>n>0?'+':(n<0?'−':'');
const cls=n=>n>0?'pos':(n<0?'neg':'flat');
const arr=n=>n>0?'▲':(n<0?'▼':'■');

function card(a){
  if(!a)return `<div class="empty"><div class="e1">— 빈 슬롯 —</div><div class="e2">계좌 배정 대기</div></div>`;
  if(a.status==='pending')return `<div class="empty"><div class="e1">${a.label}</div><div class="e2">${a.sub||'연결 준비중'}</div></div>`;
  const seed=+a.seed||0, bal=+a.balance||0, eq=+a.equity||0;
  const rp = seed ? (bal-seed)/seed*100 : 0;   // 확정(실현) 수익률 = (잔고-시드)/시드
  const vp = seed ? (eq -seed)/seed*100 : 0;   // 평가 수익률      = (평가-시드)/시드
  const tag=a.kind==='real'?'⚡ 실전':'🧪 모의';
  return `<div class="acard"><div class="accent"></div>
    <div class="chead">
      <div class="nm"><span class="name">${a.label}</span><span class="tag">${tag}</span></div>
      <span class="seedpill mono">시드 <b>$${fmt(seed,0)}</b></span>
    </div>
    <div class="grid4">
      <div class="cell"><div class="ck">현재 잔고</div><div class="cv mono">$${fmt(bal)}</div></div>
      <div class="cell"><div class="ck">평가 잔고</div><div class="cv mono">$${fmt(eq)}</div></div>
      <div class="cell"><div class="ck">확정 수익률</div><div class="cv mono ${cls(rp)}">${sgn(rp)}${fmt(Math.abs(rp))}%</div></div>
      <div class="cell"><div class="ck">평가 수익률</div><div class="cv mono ${cls(vp)}">${sgn(vp)}${fmt(Math.abs(vp))}%</div></div>
    </div>
  </div>`;
}

function render(d){
  const cells={};
  (d.accounts||[]).forEach(a=>{
    const m=MAP[a.acc]; if(!m) return;
    cells[m.kind+'-'+m.row]=Object.assign({}, a, {label:m.label, kind:m.kind, status:'live'});
  });
  let R='',M='';
  for(let r=1;r<=3;r++){
    R+=card(cells['real-'+r] || PEND['real-'+r] || null);
    M+=card(cells['demo-'+r] || null);
  }
  $('#realCards').innerHTML=R; $('#demoCards').innerHTML=M;

  const m=$('#mrows'); m.innerHTML='';
  (d.brief||[]).forEach(s=>{const c=cls(s.pct);const row=document.createElement('div');row.className='mrow '+c;
    row.innerHTML=`<span class="sym">${s.name}</span><span class="rt"><span class="px mono">${fmt(s.price,s.digits??2)}</span><span class="ch mono">${arr(s.pct)} ${sgn(s.pct)}${fmt(Math.abs(s.pct))}%</span></span>`;m.appendChild(row);});
}

const WD=['일','월','화','수','목','금','토'];
function tick(){const n=new Date();const k=new Date(n.getTime()+(n.getTimezoneOffset()+540)*60000);
  $('#clock').textContent=[k.getHours(),k.getMinutes(),k.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  $('#date').textContent=`${k.getFullYear()}-${String(k.getMonth()+1).padStart(2,'0')}-${String(k.getDate()).padStart(2,'0')} (${WD[k.getDay()]})`;}
setInterval(tick,1000);tick();

async function poll(){try{const r=await fetch('/api/state',{cache:'no-store'});if(!r.ok)throw 0;const d=await r.json();if(!d.accounts||!d.accounts.length)throw 0;render(d);}catch(e){render(DEMO);}}
poll();setInterval(poll,3000);
function fit(){const s=Math.min(innerWidth/1920,innerHeight/1080);document.getElementById('stage').style.transform='scale('+s+')';}
addEventListener('resize',fit);fit();
</script>
</body>
</html>
